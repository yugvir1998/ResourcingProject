# Render Blueprint - Resourcing Dashboard
# https://render.com/docs/blueprint-spec
#
# After connecting your GitHub repo:
# 1. Add environment variables in Render Dashboard: Environment
# 2. Required: NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_DB_URL, OPENAI_API_KEY

services:
  - type: web
    runtime: node
    name: resourcing-dashboard
    region: oregon

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_VERSION
        value: 20
      # Add these in Render Dashboard (Environment tab) - never commit secrets:
      # - NEXT_PUBLIC_SUPABASE_URL
      # - SUPABASE_SERVICE_ROLE_KEY
      # - SUPABASE_DB_URL
      # - OPENAI_API_KEY
      # - AUTH_SECRET, AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET (Google OAuth; RENDER_EXTERNAL_URL is auto-set for redirect_uri)
      # - Optional: ALLOWED_EMAIL_DOMAINS=gitwit.com  |  Custom domain: AUTH_URL=https://your-domain.com
